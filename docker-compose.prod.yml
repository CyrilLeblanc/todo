services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todoapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/cyrilleblanc/todo-backend:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todoapp
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/cyrilleblanc/todo-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
